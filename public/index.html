<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Belt-and-suspenders cache busting. The Cache-Control hosting
         header already says no-cache, but iOS browsers sometimes ignore
         it when a service worker is registered. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />

    <!-- Theme / brand colours (status bar tint; splash bg comes from manifest) -->
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA app mode (mobile-web-app-capable is the modern name; iOS still reads apple-*) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Upper House Parking" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- Favicon / high-res icon sources for Android Chrome fallback -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <title>Upper House Parking</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        direction: rtl;
        height: 100%;
        overflow: hidden;
      }
      #root {
        /* --app-height is set by JS from window.innerHeight (see script
           below) — the only reliable cross-browser viewport measurement
           on iOS, where Chrome's 100dvh is buggy. The two `height` rules
           before it are a fallback for the brief moment before JS runs. */
        height: 100vh;
        height: 100dvh;
        height: var(--app-height, 100dvh);
        display: flex;
        flex-direction: column;
        background-color: #0a0a0f;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        box-sizing: border-box;
      }
      /* Hide scrollbar globally */
      ::-webkit-scrollbar {
        display: none;
      }
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
    </style>
    <script>
      // iOS Chrome (CriOS) reports 100dvh as the *large* viewport even
      // when its toolbars are visible, which hides bottom-anchored UI.
      // window.innerHeight is the only reliable measure of the actually-
      // visible viewport across all iOS browsers. Refresh on resize,
      // orientation change, and visualViewport changes (covers the
      // dynamic toolbar collapse on scroll).
      (function () {
        function setAppHeight() {
          document.documentElement.style.setProperty(
            '--app-height',
            window.innerHeight + 'px'
          );
        }
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
        }
        setAppHeight();
      })();
    </script>
    <script>
      // ONE-TIME SERVICE WORKER PURGE. Users who installed an earlier
      // version of the PWA have a stale service worker controlling their
      // tab, and some of them never seem to pick up new index.html
      // revisions (iOS WebKit + SW interaction). On the next load only,
      // unregister any controlling SW and reload once with cache bypassed.
      // The sessionStorage flag prevents infinite reload loops; the FCM
      // service worker re-registers itself the next time the user runs
      // usePushNotifications (i.e. they're signed in).
      (function () {
        if (!('serviceWorker' in navigator)) return;
        if (sessionStorage.getItem('sw-purged-v2') === '1') return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (regs.length === 0) {
            sessionStorage.setItem('sw-purged-v2', '1');
            return;
          }
          Promise.all(regs.map(function (r) { return r.unregister(); }))
            .then(function () {
              sessionStorage.setItem('sw-purged-v2', '1');
              // Clear the http cache as best we can, then reload.
              if (window.caches && caches.keys) {
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }).then(function () { location.reload(); });
              } else {
                location.reload();
              }
            });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
