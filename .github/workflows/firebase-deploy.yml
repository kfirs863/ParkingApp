name: Deploy to Firebase

# Runs on every push to master, or manually via the Actions tab.
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  # ── Detect which parts of the codebase changed ──────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'functions/**'
              - 'firestore.rules'
              - 'firestore.indexes.json'
            frontend:
              - 'src/**'
              - 'App.tsx'
              - 'app.config.js'
              - 'public/**'
              - 'web/**'
              - 'package.json'

  # ── Backend: Cloud Functions + Firestore rules/indexes ──────────────────────
  deploy_backend:
    name: Deploy Backend (Functions + Firestore)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Functions Dependencies
        run: cd functions && npm install

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy Backend to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes --force
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: parkingapp-1fb82

  # ── Web: Expo PWA build → Firebase Hosting ──────────────────────────────────
  deploy_web:
    name: Build and Deploy Web PWA
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Bundle (Expo export)
        run: npx expo export --platform web

      - name: Deploy Web to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: parkingapp-1fb82
