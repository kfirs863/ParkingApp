name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which deploy to run'
        required: true
        default: 'auto'
        type: choice
        options: [auto, backend, frontend, both]
  push:
    branches:
      - master

# Don't let two pushes race a deploy. Queue rather than cancel — half-deployed
# state is worse than waiting.
concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: false

# Opt into Node.js 24 runtime for all actions (Node 20 is deprecated Jun 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_TOOLS_VERSION: ^15

jobs:
  # ── Detect which parts of the codebase changed ──────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'functions/**'
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'firebase.json'
              - '.firebaserc'
            frontend:
              - 'src/**'
              - 'App.tsx'
              - 'app.config.js'
              - 'metro.config.js'
              - 'public/**'
              - 'web/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'shims/**'
              - 'scripts/**'
              - 'assets/**'
              - 'firebase.json'
              - '.firebaserc'

  # ── Backend: Cloud Functions + Firestore rules/indexes ──────────────────────
  deploy_backend:
    name: Deploy Backend (Functions + Firestore)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        inputs.target == 'backend' ||
        inputs.target == 'both' ||
        (inputs.target == 'auto' && needs.changes.outputs.backend == 'true')
      ))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Root Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Functions Dependencies
        run: npm ci
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Deploy Backend to Firebase
        run: firebase deploy --only functions,firestore:rules,firestore:indexes --project parkingapp-1fb82

  # ── Web: Expo PWA build → Firebase Hosting ──────────────────────────────────
  deploy_web:
    name: Build and Deploy Web PWA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && (
        inputs.target == 'frontend' ||
        inputs.target == 'both' ||
        (inputs.target == 'auto' && needs.changes.outputs.frontend == 'true')
      ))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web Bundle (Expo export)
        run: npx expo export --platform web

      - name: Verify Build Artifacts
        run: |
          set -e
          test -f dist/index.html
          test -f dist/manifest.json
          test -f dist/firebase-messaging-sw.js
          test -d dist/_expo
          # index.html must be non-trivial; an empty template would still pass -f
          test "$(wc -c < dist/index.html)" -gt 500
          echo "Build artifacts OK"

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Deploy Web to Firebase Hosting
        run: firebase deploy --only hosting:upper-house-parking --project parkingapp-1fb82
