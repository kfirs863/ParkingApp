name: Deploy to Firebase

on:
  workflow_dispatch:
  push:
    branches:
      - master

# Opt into Node.js 24 runtime for all actions (Node 20 is deprecated Jun 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detect which parts of the codebase changed ──────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD~1 available for paths-filter on workflow_dispatch
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On workflow_dispatch there is no 'before' SHA; compare against
          # the previous commit so the filter works without warnings.
          base: ${{ github.event_name == 'workflow_dispatch' && 'HEAD~1' || github.event.before }}
          filters: |
            backend:
              - 'functions/**'
              - 'firestore.rules'
              - 'firestore.indexes.json'
            frontend:
              - 'src/**'
              - 'App.tsx'
              - 'app.config.js'
              - 'metro.config.js'
              - 'public/**'
              - 'web/**'
              - 'package.json'
              - 'shims/**'
              - 'scripts/**'

  # ── Backend: Cloud Functions + Firestore rules/indexes ──────────────────────
  deploy_backend:
    name: Deploy Backend (Functions + Firestore)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Functions Dependencies
        run: cd functions && npm install

      - name: Build Functions
        run: cd functions && npm run build

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy Backend to Firebase
        run: firebase deploy --only functions,firestore:rules,firestore:indexes --force --project parkingapp-1fb82

  # ── Web: Expo PWA build → Firebase Hosting ──────────────────────────────────
  deploy_web:
    name: Build and Deploy Web PWA
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install expo-router SSR stub
        run: |
          node scripts/install-expo-router-stub.js
          ls -la node_modules/expo-router/node/render.js

      - name: Build Web Bundle (Expo export)
        run: npx expo export --platform web

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy Web to Firebase Hosting
        run: firebase deploy --only hosting --project parkingapp-1fb82
