name: Deploy to Firebase

# Runs on every push to master, or manually via the Actions tab.
# Each job watches its own paths and skips itself when nothing relevant changed.
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  # ── Backend: Cloud Functions + Firestore rules/indexes ──────────────────────
  deploy_backend:
    name: Deploy Backend (Functions + Firestore)
    runs-on: ubuntu-latest
    # Only run when backend files change (or triggered manually)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits), 'functions/') ||
      contains(toJSON(github.event.commits), 'firestore.rules') ||
      contains(toJSON(github.event.commits), 'firestore.indexes.json')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Functions Dependencies
        run: cd functions && npm install

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy Backend to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes --force
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: parkingapp-1fb82

  # ── Web: Expo PWA build → Firebase Hosting ──────────────────────────────────
  deploy_web:
    name: Build and Deploy Web PWA
    runs-on: ubuntu-latest
    # Only run when frontend files change (or triggered manually)
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits), 'src/') ||
      contains(toJSON(github.event.commits), 'App.tsx') ||
      contains(toJSON(github.event.commits), 'app.config.js') ||
      contains(toJSON(github.event.commits), 'public/') ||
      contains(toJSON(github.event.commits), 'web/')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Bundle (Expo export)
        run: npx expo export --platform web
        # Expo exports to dist/ by default

      - name: Deploy Web to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT_ID: parkingapp-1fb82
